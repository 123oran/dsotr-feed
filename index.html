<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dark Side of the Rainbow — Feed</title>
<link rel="stylesheet" href="./styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: var(--paper-screen); font-family: var(--font-sans); }
  * { scrollbar-width: none; }
  *::-webkit-scrollbar { width: 0; height: 0; display: none; }
  /* CMYK halftone fill for the "Add Your Story" heading — path is relative
     to this page so the dither PNG resolves correctly. */
  .cmy-heading h2 {
    background: url("./assets/dither/cmyk-dither-warm.png") center / 100% 100% no-repeat !important;
    -webkit-background-clip: text !important;
    background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    color: transparent !important;
    filter: drop-shadow(1px 1px 0 var(--sand)) !important;
    padding-bottom: 8px !important;
    overflow: visible !important;
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="posters.js"></script>
<script type="text/babel" src="Feed.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.DSOTRFeed));
</script>
</body>
</html>
