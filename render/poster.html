<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DSOTR — poster render harness</title>
<!-- Loaded one level up from the app root; the batch renderer serves the feed
     folder as the web root and opens /render/poster.html?issue=…&model=…&mode=… -->
<link rel="stylesheet" href="../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../_ds_bundle.js"></script>
<style>
  html, body { margin: 0; background: #000; }
  * { scrollbar-width: none; }
  *::-webkit-scrollbar { display: none; }
  /* #frame is the exact capture rectangle (the output video size). #stage holds
     the poster at a smaller BASE size — the same proportions the app preview is
     tuned for — then scales up to fill the frame. Text is vector (stays crisp);
     the cross-origin model iframe is raster-scaled (acceptably soft). */
  #frame { position: absolute; top: 0; left: 0; overflow: hidden; }
  #stage { position: relative; transform-origin: 0 0; }
</style>
</head>
<body>
<div id="frame"><div id="stage"></div></div>
<script src="../posters.js"></script>
<script type="text/babel" src="../Feed.jsx"></script>
<script type="text/babel">
  // Feed.jsx exposes the exact in-app poster renderer + data on window.DSOTR_RENDER.
  const q = new URLSearchParams(location.search);
  const R = window.DSOTR_RENDER || {};
  const { LivePoster, MODELS, ISSUES, issueKey } = R;

  const BASE_W = Number(q.get("bw")) || 360;   // base CSS px — poster looks like the app preview here
  const BASE_H = Number(q.get("bh")) || 450;   // 4:5
  const OUT_W  = Number(q.get("w"))  || 1080;  // output/video px
  const OUT_H  = Number(q.get("h"))  || 1350;
  const mode   = q.get("mode") === "dark" ? "dark" : "light";
  const issue  = (ISSUES || []).find((i) => issueKey(i) === q.get("issue")) || (ISSUES || [])[0];
  const model  = (MODELS || []).find((m) => m.key === q.get("model")) || (MODELS || [])[0];

  const frame = document.getElementById("frame");
  const stage = document.getElementById("stage");
  frame.style.width = OUT_W + "px";
  frame.style.height = OUT_H + "px";
  stage.style.width = BASE_W + "px";
  stage.style.height = BASE_H + "px";
  // `zoom` re-lays-out and re-renders at the target size, so the model iframe
  // renders NATIVELY at 1080-wide (crisp). `transform: scale` would only raster-
  // upscale the 360px render (soft). Text stays vector-crisp either way.
  stage.style.zoom = String(OUT_W / BASE_W);

  function Harness() {
    return React.createElement(
      "div",
      { style: { position: "absolute", inset: 0 } },
      React.createElement(LivePoster, { issue: issue, model: model, mode: mode, rounded: 0, compact: false })
    );
  }
  ReactDOM.createRoot(stage).render(React.createElement(Harness));

  // Optional rotateSpeed override. The live app speed (0.8) takes ~75s for one
  // full turn (period = 60 / rotateSpeed); for short seamless loops the renderer
  // passes a faster spin so a whole rotation fits the clip. The iframe element is
  // same-origin (only its content is cross-origin), so we can rewrite its src.
  const spin = q.get("spin");
  const markReady = () => { window.__posterReady = true; };

  if (spin) {
    // Wait for LivePoster's iframe (React may commit it a few frames later), then
    // rewrite its src to spin faster. That reloads the viewer, so we mark ready
    // only once the faster URL is set — the renderer's warm-up then covers the
    // reload + spin-up before it starts capturing.
    let tries = 0;
    const iv = setInterval(() => {
      const f = document.querySelector("iframe");
      if (f && /rotateSpeed=/.test(f.src)) {
        f.src = f.src.replace(/rotateSpeed=[\d.]+/, "rotateSpeed=" + spin);
        clearInterval(iv);
        markReady();
      } else if (++tries > 100) {   // ~5s fallback
        clearInterval(iv);
        markReady();
      }
    }, 50);
  } else {
    // Tell the recorder the DOM is mounted (iframe warm-up handled separately).
    requestAnimationFrame(() => requestAnimationFrame(markReady));
  }
</script>
</body>
</html>
